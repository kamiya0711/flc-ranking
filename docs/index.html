<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLC フルーツリーグチャンピオンシップ ランキング</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: #0e0a06;
    color: #fff;
    min-height: 100vh;
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 16px;
  }

  /* ── ヘッダー ──────────────────── */
  header {
    text-align: center;
    padding: 32px 16px 24px;
    border: 2px solid #d4af37;
    border-radius: 12px;
    background: linear-gradient(180deg, #090602 0%, #1a1208 100%);
    margin-bottom: 20px;
    position: relative;
  }
  .season-label {
    font-size: 13px;
    font-weight: 700;
    color: #d4af37;
    letter-spacing: 3px;
    margin-bottom: 4px;
  }
  .season-num {
    font-size: 28px;
    font-weight: 900;
    color: #ffd700;
    letter-spacing: 4px;
    text-shadow: 0 2px 8px rgba(255, 215, 0, .3);
    margin-bottom: 12px;
  }
  .logo {
    width: 180px;
    height: auto;
    margin-bottom: 8px;
  }
  .subtitle {
    font-size: 16px;
    color: #c0c0c0;
    margin-top: 8px;
    line-height: 1.8;
  }

  /* ── 大会詳細ボタン ────────────── */
  .detail-btn {
    display: inline-block;
    margin-top: 14px;
    padding: 10px 28px;
    background: linear-gradient(180deg, #3a2a08 0%, #1a1208 100%);
    border: 1px solid #d4af37;
    border-radius: 8px;
    color: #ffd700;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: background .15s, box-shadow .15s;
    letter-spacing: 1px;
  }
  .detail-btn:hover {
    background: linear-gradient(180deg, #4a3a10 0%, #2a1e0a 100%);
    box-shadow: 0 0 12px rgba(255, 215, 0, .25);
  }

  /* ── 大会詳細画像モーダル ──────── */
  .img-modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.8);
    z-index: 200;
    justify-content: center;
    align-items: center;
    padding: 24px;
  }
  .img-modal-overlay.active { display: flex; }
  .img-modal-overlay img {
    max-width: 100%;
    max-height: 90vh;
    border-radius: 8px;
    border: 2px solid #d4af37;
  }
  .img-modal-close {
    position: absolute;
    top: 16px;
    right: 24px;
    background: none;
    border: none;
    color: #ffd700;
    font-size: 36px;
    cursor: pointer;
    line-height: 1;
    z-index: 201;
  }
  .img-modal-close:hover { color: #fff; }

  /* ── ランキングテーブル ──────────── */
  .ranking-table {
    width: 100%;
    border-collapse: collapse;
    border: 1px solid #64501a;
    border-radius: 8px;
    overflow: hidden;
  }
  .ranking-table thead th {
    background: #0b0804;
    color: #d4af37;
    font-size: 13px;
    font-weight: 700;
    padding: 12px 8px;
    border-bottom: 2px solid #d4af37;
    text-align: center;
  }
  .ranking-table thead th.name-col { text-align: left; padding-left: 16px; }

  .ranking-table tbody tr {
    cursor: pointer;
    transition: background .15s;
  }
  .ranking-table tbody tr:hover {
    background: #2a1e0a !important;
  }
  .ranking-table tbody tr.rank-1 { background: #342804; }
  .ranking-table tbody tr.rank-2 { background: #24242e; }
  .ranking-table tbody tr.rank-3 { background: #301e0c; }
  .ranking-table tbody tr.row-even { background: #1e160c; }
  .ranking-table tbody tr.row-odd  { background: #161008; }

  .ranking-table tbody td {
    padding: 12px 8px;
    font-size: 15px;
    text-align: center;
    border-bottom: 1px solid #64501a;
  }
  .ranking-table tbody td.name-cell {
    text-align: left;
    padding-left: 16px;
    color: #fff;
  }
  .ranking-table tbody td.name-cell .click-hint {
    font-size: 10px;
    color: #826412;
    margin-left: 6px;
  }

  .rank-num { font-weight: 700; font-size: 17px; }
  .rank-1 .rank-num { color: #ffd700; }
  .rank-2 .rank-num { color: #c0c0c0; }
  .rank-3 .rank-num { color: #cd7f32; }

  .pts { color: #d4af37; font-weight: 700; }

  .eligible-yes { color: #64dc82; font-weight: 700; }
  .eligible-no  { color: #828282; }

  /* 出場ラインの区切り */
  .ranking-table tbody tr.eligible-border td {
    border-bottom: 3px solid #b48c0a;
  }

  /* ── モーダル ───────────────────── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.75);
    z-index: 100;
    justify-content: center;
    align-items: flex-start;
    padding: 40px 16px;
    overflow-y: auto;
  }
  .modal-overlay.active {
    display: flex;
  }
  .modal {
    background: #1a1208;
    border: 2px solid #d4af37;
    border-radius: 12px;
    width: 100%;
    max-width: 640px;
    padding: 24px;
    position: relative;
    animation: modalIn .2s ease-out;
  }
  @keyframes modalIn {
    from { transform: translateY(20px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }
  .modal-close {
    position: absolute;
    top: 12px; right: 16px;
    background: none;
    border: none;
    color: #d4af37;
    font-size: 28px;
    cursor: pointer;
    line-height: 1;
  }
  .modal-close:hover { color: #ffd700; }

  .modal-title {
    font-size: 22px;
    font-weight: 900;
    color: #ffd700;
    margin-bottom: 4px;
  }
  .modal-rank {
    font-size: 14px;
    color: #c0c0c0;
    margin-bottom: 16px;
  }
  .modal-summary {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .modal-summary .stat {
    background: #0e0a06;
    border: 1px solid #64501a;
    border-radius: 8px;
    padding: 10px 16px;
    text-align: center;
    flex: 1;
    min-width: 120px;
  }
  .stat-label { font-size: 11px; color: #826412; }
  .stat-value { font-size: 20px; font-weight: 700; color: #d4af37; margin-top: 2px; }

  .detail-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .detail-table thead th {
    background: #0b0804;
    color: #d4af37;
    padding: 8px 6px;
    border-bottom: 1px solid #64501a;
    font-weight: 700;
    text-align: center;
  }
  .detail-table tbody td {
    padding: 8px 6px;
    border-bottom: 1px solid #2a1e0a;
    text-align: center;
  }
  .detail-table tbody tr.top-result {
    background: #2a2200;
  }
  .detail-table tbody tr.top-result td:last-child {
    color: #ffd700;
  }
  .detail-table tbody tr:not(.top-result) {
    color: #aaa;
  }

  .detail-total {
    margin-top: 12px;
    text-align: right;
    font-size: 14px;
    color: #c0c0c0;
  }
  .detail-total strong {
    color: #ffd700;
    font-size: 18px;
  }

  /* ── フッター ───────────────────── */
  footer {
    text-align: center;
    padding: 24px 16px;
    font-size: 11px;
    color: #646464;
    border-top: 1px solid #2a1e0a;
    margin-top: 24px;
  }

  /* ── レスポンシブ ─────────────────── */
  @media (max-width: 480px) {
    .title-flc { font-size: 36px; }
    .ranking-table tbody td { font-size: 13px; padding: 10px 4px; }
    .modal { padding: 16px; }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="season-label">― SEASON ―</div>
    <div class="season-num">1st</div>
    <img src="logo.jpg" alt="FLC" class="logo">
    <div class="subtitle" id="subtitle">読み込み中...</div>
    <button class="detail-btn" id="open-tournament-detail">大会詳細</button>
  </header>

  <table class="ranking-table">
    <thead>
      <tr>
        <th style="width:60px">順位</th>
        <th class="name-col">名前</th>
        <th style="width:100px">合計PT</th>
        <th style="width:60px">出場</th>
      </tr>
    </thead>
    <tbody id="ranking-body">
    </tbody>
  </table>

  <footer>
    <div id="footer-info"></div>
    <div style="margin-top:4px">FLC フルーツリーグチャンピオンシップ</div>
  </footer>
</div>

<!-- 大会詳細画像モーダル -->
<div class="img-modal-overlay" id="img-modal-overlay">
  <button class="img-modal-close" id="img-modal-close">&times;</button>
  <img src="tournament_detail.png" alt="大会詳細">
</div>

<!-- 詳細モーダル -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <button class="modal-close" id="modal-close">&times;</button>
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-rank" id="modal-rank"></div>
    <div class="modal-summary" id="modal-summary"></div>
    <table class="detail-table">
      <thead>
        <tr>
          <th>トーナメント</th>
          <th>着順</th>
          <th>エントリー数</th>
          <th>ポイント</th>
        </tr>
      </thead>
      <tbody id="detail-body">
      </tbody>
    </table>
    <div class="detail-total" id="detail-total"></div>
  </div>
</div>

<script>
let rankingData = null;

async function init() {
  try {
    const res = await fetch('ranking_data.json');
    rankingData = await res.json();
    render();
  } catch (e) {
    document.getElementById('ranking-body').innerHTML =
      '<tr><td colspan="4" style="padding:24px;color:#c0c0c0">データを読み込めませんでした。ranking_data.json を確認してください。</td></tr>';
  }
}

function render() {
  const d = rankingData;
  const eligibleRank = d.eligible_rank;
  const topN = d.top_n_results;
  const seasonStart = d.season_start || '全期間';
  const calcDate = d.calc_date;

  document.getElementById('subtitle').innerHTML =
    `集計日: ${escHtml(calcDate)}<br>集計期間: ${escHtml(seasonStart)}`;
  document.getElementById('footer-info').textContent =
    `出場可否 ○: 上位${eligibleRank}名　　集計対象: 上位${topN}回分のポイントを合算`;

  const tbody = document.getElementById('ranking-body');
  tbody.innerHTML = '';

  d.players.forEach((p, i) => {
    const rank = i + 1;
    const tr = document.createElement('tr');

    let cls = '';
    if (rank === 1) cls = 'rank-1';
    else if (rank === 2) cls = 'rank-2';
    else if (rank === 3) cls = 'rank-3';
    else cls = i % 2 === 0 ? 'row-odd' : 'row-even';

    if (rank === eligibleRank) cls += ' eligible-border';
    tr.className = cls;

    const eligible = rank <= eligibleRank;
    tr.innerHTML = `
      <td><span class="rank-num">${rank}位</span></td>
      <td class="name-cell">${escHtml(p.nickname)}様<span class="click-hint">▶詳細</span></td>
      <td class="pts">${p.total_points.toFixed(1)} pt</td>
      <td class="${eligible ? 'eligible-yes' : 'eligible-no'}">${eligible ? '○' : '×'}</td>
    `;

    tr.addEventListener('click', () => showDetail(p, rank));
    tbody.appendChild(tr);
  });
}

function showDetail(player, rank) {
  const d = rankingData;

  document.getElementById('modal-title').textContent = player.nickname + '様';
  document.getElementById('modal-rank').textContent = `現在 ${rank}位`;

  const summary = document.getElementById('modal-summary');
  summary.innerHTML = `
    <div class="stat">
      <div class="stat-label">合計ポイント</div>
      <div class="stat-value">${player.total_points.toFixed(1)}</div>
    </div>
    <div class="stat">
      <div class="stat-label">1位回数</div>
      <div class="stat-value">${player.count_1st}</div>
    </div>
    <div class="stat">
      <div class="stat-label">ベストスコア</div>
      <div class="stat-value">${player.best_score.toFixed(1)}</div>
    </div>
  `;

  const topIds = new Set(player.top_result_indices || []);
  const tbody = document.getElementById('detail-body');
  tbody.innerHTML = '';

  const sorted = [...player.results].sort((a, b) => {
    if (!a.date) return 1;
    if (!b.date) return -1;
    return a.date.localeCompare(b.date);
  });

  sorted.forEach((r) => {
    if (!topIds.has(r._index)) return;
    const tr = document.createElement('tr');
    tr.className = 'top-result';

    const rankStr = r.rank || '-';
    const tname = (r.tournament_name || r.tournament_id)
      .replace(/\d{1,2}:\d{2}[~～\-]\d{1,2}:\d{2}\s*/g, '')
      .trim();

    tr.innerHTML = `
      <td style="text-align:left">${escHtml(tname)}</td>
      <td>${rankStr}</td>
      <td>${r.total_entries}</td>
      <td>${r.points.toFixed(1)}</td>
    `;
    tbody.appendChild(tr);
  });

  const topPoints = player.total_points;
  document.getElementById('detail-total').innerHTML =
    `合計（上位${d.top_n_results}回）: <strong>${topPoints.toFixed(1)} pt</strong>`;

  document.getElementById('modal-overlay').classList.add('active');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('active');
}

document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeModal();
});
document.querySelector('.modal').addEventListener('click', (e) => {
  e.stopPropagation();
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
});

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

document.getElementById('open-tournament-detail').addEventListener('click', () => {
  document.getElementById('img-modal-overlay').classList.add('active');
});
document.getElementById('img-modal-close').addEventListener('click', () => {
  document.getElementById('img-modal-overlay').classList.remove('active');
});
document.getElementById('img-modal-overlay').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) {
    document.getElementById('img-modal-overlay').classList.remove('active');
  }
});

init();
</script>
</body>
</html>
